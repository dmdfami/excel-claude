<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta http-equiv="X-UA-Compatible" content="IE=edge" />
<title>Claude (cowork)</title>
<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
  body { display: flex; flex-direction: column; height: 100vh; font-size: 13px; background: #fafafa; color: #1a1a1a; }
  #header { padding: 8px 12px; background: #fff; border-bottom: 1px solid #e5e5e5; display: flex; align-items: center; gap: 8px; }
  #header .dot { width: 8px; height: 8px; border-radius: 50%; background: #888; }
  #header .dot.ok { background: #2da44e; }
  #header .label { font-weight: 600; }
  #header select { margin-left: auto; font-size: 12px; padding: 2px 4px; }
  #log { flex: 1; overflow-y: auto; padding: 12px; }
  .msg { margin-bottom: 12px; padding: 10px 12px; border-radius: 8px; line-height: 1.5; word-wrap: break-word; white-space: pre-wrap; }
  .msg.user { background: #eef4ff; }
  .msg.assistant { background: #fff; border: 1px solid #e5e5e5; }
  .msg.tool { background: #fff7e0; font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 11px; }
  .msg.error { background: #ffebe9; color: #cf222e; }
  #input-row { display: flex; padding: 8px; gap: 6px; background: #fff; border-top: 1px solid #e5e5e5; }
  #input { flex: 1; padding: 8px; border: 1px solid #d0d7de; border-radius: 6px; font-size: 13px; resize: none; min-height: 36px; max-height: 120px; }
  #send { padding: 8px 14px; background: #1f883d; color: #fff; border: 0; border-radius: 6px; cursor: pointer; font-weight: 600; }
  #send:disabled { opacity: 0.5; cursor: not-allowed; }
  #send:hover:not(:disabled) { background: #1a6e32; }
</style>
</head>
<body>

<div id="header">
  <div class="dot" id="status-dot" title="Gateway status"></div>
  <div class="label">Claude</div>
  <select id="model-picker"></select>
</div>

<div id="log"></div>

<div id="input-row">
  <textarea id="input" placeholder="Hỏi gì đó về bảng tính… (Cmd+Enter để gửi)"></textarea>
  <button id="send">Gửi</button>
</div>

<script>
// cowork-gateway add-in — minimal chat UI that talks to the local
// HTTPS gateway (same origin: https://127.0.0.1:PORT) and executes
// returned tool_use blocks against the active workbook via Office.js.

const GATEWAY = window.location.origin; // same as the host serving this page
const log     = document.getElementById('log');
const input   = document.getElementById('input');
const send    = document.getElementById('send');
const dot     = document.getElementById('status-dot');
const picker  = document.getElementById('model-picker');

const history = []; // [{role, content}]

function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
  return div;
}

async function fetchModels() {
  try {
    const res = await fetch(GATEWAY + '/v1/models');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const ids = (data.data || []).map(m => m.id).filter(id => /^claude-/.test(id) && !id.includes('/'));
    picker.innerHTML = ids.map(id => `<option>${id}</option>`).join('') || '<option>claude-sonnet-4-6</option>';
    dot.classList.add('ok');
    dot.title = 'Gateway reachable: ' + GATEWAY;
  } catch (e) {
    picker.innerHTML = '<option>claude-sonnet-4-6</option>';
    dot.title = 'Gateway unreachable: ' + e.message;
    addMsg('error', 'Gateway không kết nối được: ' + e.message);
  }
}

// Office.js tool: execute arbitrary Excel.run code from the model.
const TOOLS = [
  {
    name: 'execute_office_js',
    description: 'Run Office.js code inside Excel.run. Use to read/write cells, format, create sheets, charts, etc. Receives async (context) where context is the request context. Always end with await context.sync().',
    input_schema: {
      type: 'object',
      properties: { code: { type: 'string', description: 'JavaScript body for Excel.run((context) => { ... })' } },
      required: ['code'],
    },
  },
];

async function executeOfficeJs(code) {
  // Wrap user code in Excel.run with helpful aliases.
  const wrapped = `return Excel.run(async (context) => { ${code} });`;
  // eslint-disable-next-line no-new-func
  const fn = new Function('Excel', 'context', wrapped);
  try {
    await fn(Excel);
    return { ok: true };
  } catch (e) {
    return { ok: false, error: String(e?.message || e) };
  }
}

async function chat(userText) {
  history.push({ role: 'user', content: userText });
  addMsg('user', userText);
  send.disabled = true;

  // Loop until no tool_use returned
  let safetyMax = 8;
  while (safetyMax--) {
    const body = {
      model: picker.value,
      max_tokens: 4096,
      tools: TOOLS,
      messages: history,
    };
    let res, data;
    try {
      res = await fetch(GATEWAY + '/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'anthropic-version': '2023-06-01',
        },
        body: JSON.stringify(body),
      });
      data = await res.json();
    } catch (e) {
      addMsg('error', 'Lỗi gọi gateway: ' + e.message);
      break;
    }
    if (data.error) {
      addMsg('error', 'API error: ' + (data.error.message || JSON.stringify(data.error)));
      break;
    }

    // Append assistant turn to history
    history.push({ role: 'assistant', content: data.content });

    let textOut = '';
    const toolResults = [];
    for (const block of data.content || []) {
      if (block.type === 'text' && block.text) {
        textOut += block.text;
      } else if (block.type === 'tool_use' && block.name === 'execute_office_js') {
        const code = block.input?.code || '';
        addMsg('tool', '⚙ ' + (code.length > 200 ? code.slice(0, 200) + '…' : code));
        const result = await executeOfficeJs(code);
        toolResults.push({
          type: 'tool_result',
          tool_use_id: block.id,
          content: result.ok ? 'ok' : 'ERROR: ' + result.error,
          is_error: !result.ok,
        });
      }
    }
    if (textOut) addMsg('assistant', textOut);

    if (data.stop_reason !== 'tool_use' || toolResults.length === 0) break;
    history.push({ role: 'user', content: toolResults });
  }
  send.disabled = false;
  input.focus();
}

send.addEventListener('click', () => {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  chat(text);
});
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
    e.preventDefault();
    send.click();
  }
});

Office.onReady((info) => {
  if (info.host === Office.HostType.Excel) {
    fetchModels();
  } else {
    addMsg('error', 'Add-in này chỉ hỗ trợ Excel.');
  }
});
</script>

</body>
</html>
